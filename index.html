*{margin:0;padding:0;box-sizing:border-box}
body{

display:flex;

align-items:center;
background:linear-gradient(-45deg,#0f172a,#1e3a8a,#2563eb,#38bdf8);

animation:bg 12s ease infinite;

@keyframes bg {

.card{

input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
margin-bottom:15px;
}
button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}
button:hover{transform:scale(1.03)}
.result{
display:none;
margin-top:20px;
padding:20px;
border-radius:15px;
background:rgba(255,255,255,.15);
animation:fade .5s ease;
}
.label{font-weight:bold;color:#fde68a}
.footer{text-align:center;margin-top:20px;font-size:13px}
</style>
</head>
